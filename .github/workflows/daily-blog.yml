name: Insights post (every 2nd day)

on:
  # 23:00 UTC = 09:00 AEST (UTC+10). During AEDT (Oct-Apr Sydney summer)
  # this runs at 10:00 local. Acceptable shift for a blog cron.
  #
  # */2 in day-of-month = days 1, 3, 5, 7, ..., 29, 31. There's a
  # 1-day gap at month boundaries when the month ends on an odd day
  # (Jan 31 -> Feb 1 -> Feb 3 = 1 then 2 days). Acceptable for a blog
  # cadence; over 100 articles this loses about 3-4 days vs strict alternating.
  schedule:
    - cron: "0 23 */2 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write # for auto-issue on failure

concurrency:
  group: insights-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate post
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/daily-blog.mjs

      - name: Commit and push
        if: steps.gen.outputs.changed == 'true'
        run: |
          git config user.name "store-auditor-bot"
          git config user.email "store-auditor-bot@users.noreply.github.com"
          git add src/content/insights/${{ steps.gen.outputs.slug }}.md content/blog-calendar.json
          git commit -F /tmp/commit-msg.txt
          git push

      - name: Summary
        if: always()
        run: |
          {
            echo "## Insights run"
            echo ""
            if [ "${{ steps.gen.outputs.changed }}" = "true" ]; then
              echo "**Published:** \`${{ steps.gen.outputs.slug }}\`"
              echo ""
              echo "**Title:** ${{ steps.gen.outputs.title }}"
              echo ""
              echo "**Day:** ${{ steps.gen.outputs.day }} of 100"
              echo ""
              echo "Live at https://storeauditor.au/insights/${{ steps.gen.outputs.slug }}"
            else
              echo "Nothing to commit (calendar complete or generation failed)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Insights bot failed on ${today}`,
              labels: ['bot-failure', 'insights'],
              body: [
                '## The daily insights workflow failed',
                '',
                `**Date (UTC):** ${today}`,
                `**Run URL:** ${runUrl}`,
                `**Trigger:** ${context.eventName}`,
                '',
                '### What to check first',
                '1. Open the Run URL above and look at the "Generate post" step logs.',
                '2. Most common cause: validator bounds in `scripts/daily-blog.mjs` are tighter than what the model produces (H2 count, word count, or description length).',
                '3. Second most common: Anthropic API outage or rate limit.',
                '4. Third: GitHub Actions outage or runner issue.',
                '',
                '### What happens until fixed',
                'Every 2-day cron run will keep failing and create a new issue. Calendar advances **0 entries** per failed run.',
                '',
                '### After fixing',
                'Trigger a manual run via `gh workflow run insights-post.yml --repo Defyn-Digital/store-auditor-site` (or the Actions UI) to backfill the missed entry. Close this issue once the next run succeeds.',
              ].join('\n'),
            });
